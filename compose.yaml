services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - apps/api/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  notification-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - python
      - run_notification_worker.py
    env_file:
      - apps/api/.env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  notification-maintenance:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command:
      - python
      - run_notification_maintenance.py
    env_file:
      - apps/api/.env
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  frontend-deps:
    image: node:22-bookworm
    working_dir: /workspace
    command:
      - /bin/sh
      - -lc
      - corepack enable && pnpm install
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - root-node-modules:/workspace/node_modules
    restart: "no"

  web:
    image: node:22-bookworm
    working_dir: /workspace
    command:
      - /bin/sh
      - -lc
      - corepack enable && pnpm --filter web exec next dev --hostname 0.0.0.0 --port 3000
    env_file:
      - apps/web/.env.local
    environment:
      INTERNAL_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - root-node-modules:/workspace/node_modules
      - web-next:/workspace/apps/web/.next
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      frontend-deps:
        condition: service_completed_successfully

  mobile:
    image: node:22-bookworm
    working_dir: /workspace
    command:
      - /bin/sh
      - -lc
      - corepack enable && pnpm --filter mobile dev
    env_file:
      - apps/mobile/.env
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
      - root-node-modules:/workspace/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      api:
        condition: service_healthy
      frontend-deps:
        condition: service_completed_successfully

volumes:
  pnpm-store:
  root-node-modules:
  web-next:
